<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Připravujeme</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="img/sklipkos-favicon.ico" type="image/x-icon">

<style>
.comingSoon {
  min-height: 70vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.comingSoon h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.comingSoon p {
  font-size: 18px;
  color: #aeb4bd;
  margin-bottom: 30px;
}

.backBtn {
  display: inline-block;
  background: #1d1d22;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 12px 20px;
  text-decoration: none;
  color: #ffffff;
  font-weight: 600;
  transition: 0.2s;
}

.backBtn:hover {
  background: #25252b;
}

/* MOBIL */
@media (max-width: 900px) {

  .comingSoon {
    min-height: 100vh;
    padding: 20px;
    justify-content: center;
  }

  .comingSoon h1 {
    font-size: 30px;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .comingSoon p {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 26px;
    max-width: 280px;
  }

  .backBtn {
    width: 100%;
    max-width: 220px;
    padding: 14px 16px;
    font-size: 15px;
    border-radius: 14px;
  }
}

</style>

</head>
<body>

<div class="comingSoon">
  <h1>🕷️ Připravujeme!</h1>
  <p>Tato sekce je momentálně ve vývoji.</p>

  <button onclick="goBack()" class="backBtn">
  ← Zpět
</button>

<script>
function goBack() {
  if (window.history.length > 1) {
    history.back();
  } else {
    window.location.href = "index.html";
  }
}
</script>
</div>

</body>
</html>
