<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Připravujeme</title>
<link rel="stylesheet" href="style.css">

<style>
.comingSoon {
  min-height: 70vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.comingSoon h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.comingSoon p {
  font-size: 18px;
  color: #aeb4bd;
  margin-bottom: 30px;
}

.backBtn {
  display: inline-block;
  background: #1d1d22;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 12px 20px;
  text-decoration: none;
  color: #ffffff;
  font-weight: 600;
  transition: 0.2s;
}

.backBtn:hover {
  background: #25252b;
}
</style>

</head>
<body>

<div class="comingSoon">
  <h1>🕷️ Připravujeme</h1>
  <p>Tato sekce je momentálně ve vývoji.<br>Brzy zde najdeš jednotlivé druhy s veškerými informacemi.</p>

  <a href="index.html" class="backBtn">Zpět na hlavní stránku</a>
</div>

</body>
</html>
